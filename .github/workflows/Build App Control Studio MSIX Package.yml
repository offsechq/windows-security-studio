name: Build App Control Studio MSIX Package

on:
  workflow_dispatch:
    inputs:
      install_deps:
        description: "Install dependencies via Winget / VS BuildTools EXE (SLOW). Keep false on GitHub-hosted runners."
        required: false
        default: "false"
      x64_only:
        description: "Build x64 only (faster)"
        required: false
        default: "false"

# Prevent the workflow from running more than once per change
concurrency:
  group: ACMBuildWorkFlowGitHubSource
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-2025

    outputs:
      DRAFT_RELEASE_ID: ${{ steps.find_draft_release.outputs.DRAFT_RELEASE_ID }}
      DRAFT_RELEASE_TAG: ${{ steps.find_draft_release.outputs.DRAFT_RELEASE_TAG }}
      PACKAGE_VERSION: ${{ steps.main_buildOp.outputs.PACKAGE_VERSION }}
      MSIXBundle_PATH: ${{ steps.main_buildOp.outputs.MSIXBundle_PATH }}
      MSIXBundle_NAME: ${{ steps.main_buildOp.outputs.MSIXBundle_NAME }}
      X64MSBuildLog_PATH: ${{ steps.main_buildOp.outputs.X64MSBuildLog_PATH }}
      ARM64MSBuildLog_PATH: ${{ steps.main_buildOp.outputs.ARM64MSBuildLog_PATH }}
      X64Symbol_PATH: ${{ steps.main_buildOp.outputs.X64Symbol_PATH }}
      X64Symbol_NAME: ${{ steps.main_buildOp.outputs.X64Symbol_NAME }}
      ARM64Symbol_PATH: ${{ steps.main_buildOp.outputs.ARM64Symbol_PATH }}
      ARM64Symbol_NAME: ${{ steps.main_buildOp.outputs.ARM64Symbol_NAME }}
      SBOM_PATH: ${{ steps.main_buildOp.outputs.SBOM_PATH }}
      SBOM_NAME: ${{ steps.main_buildOp.outputs.SBOM_NAME }}
      CERT_PATH: ${{ steps.main_buildOp.outputs.CERT_PATH }}
      CERT_NAME: ${{ steps.main_buildOp.outputs.CERT_NAME }}

    permissions:
      contents: write # Required for adding files to the GitHub draft release

    steps:
      - name: Check out the repository code
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      # ---------------------------
      # CACHES (major speed boost)
      # ---------------------------

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: |
            ~\.nuget\packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.sln', '**/*.csproj', '**/packages.lock.json', '**/*.props', '**/*.targets') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Cache Cargo registry/git + Rust target
        uses: actions/cache@v5
        with:
          path: |
            ~\.cargo\registry
            ~\.cargo\git
            App Control Studio\eXclude\Rust Interop Library\target
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Cache sbom-tool
        uses: actions/cache@v5
        with:
          path: ${{ runner.temp }}\sbom-tool.exe
          key: sbomtool-${{ runner.os }}-latest

      # ---------------------------
      # BUILD
      # ---------------------------

      - name: Building And Packaging the App Control Studio
        id: main_buildOp
        shell: pwsh
        env:
          PARTNERCENTER_APPLICATIONID: ${{ secrets.PARTNERCENTER_APPLICATIONID }}
          PARTNERCENTER_CLIENTID: ${{ secrets.PARTNERCENTER_CLIENTID }}
          PARTNERCENTER_CLIENTSECRET: ${{ secrets.PARTNERCENTER_CLIENTSECRET }}
          PARTNERCENTER_TOKENENDPOINT: ${{ secrets.PARTNERCENTER_TOKENENDPOINT }}
        working-directory: "./App Control Studio"
        run: |
          $InstallDeps = '${{ inputs.install_deps }}' -eq 'true'
          $X64Only = '${{ inputs.x64_only }}' -eq 'true'

          Write-Host "install_deps = $InstallDeps"
          Write-Host "x64_only     = $X64Only"

          # Call your existing build function but use workflow inputs for speed control
          # NOTE: Your Build_ACM function must exist as-is in this script body (unchanged below).
          # Only the final invocation is adjusted.
          # -------------------------------------------------------------------------------

          # For GitHub workflow 1 (Self build)
          Build_ACM -Type Self -DownloadRepo $false -InstallDeps $InstallDeps -Workflow $true -UpdateWorkLoads $false -Install $false -Upload $false -X64ONLY $X64Only

      # ---------------------------
      # DRAFT RELEASE
      # ---------------------------

      - name: Finding or Creating Draft Release
        id: find_draft_release
        shell: pwsh
        run: |
          $Headers = @{ Authorization = "token ${{ secrets.GITHUB_TOKEN }}"; Accept = "application/vnd.github.v3+json" }
          $RepoUrl = "https://api.github.com/repos/${{ github.repository }}"

          # Find the latest draft release via GitHub REST API
          $Response = Invoke-RestMethod -Uri "$RepoUrl/releases" -Headers $Headers
          $DraftRelease = $Response | Where-Object { $_.draft -eq $true } | Select-Object -First 1

          if (!$DraftRelease) {
              Write-Host "No draft release found. Creating a new one..."

              $TagName = "v${{ env.PACKAGE_VERSION }}"
              $ReleaseName = "App Control Studio v${{ env.PACKAGE_VERSION }}"

              $Body = @{
                  tag_name = $TagName
                  name = $ReleaseName
                  body = "Release $TagName - Auto-generated by workflow"
                  draft = $true
                  prerelease = $false
              } | ConvertTo-Json

              $DraftRelease = Invoke-RestMethod -Uri "$RepoUrl/releases" -Method Post -Headers $Headers -Body $Body -ContentType "application/json"
          }

          $DRAFT_RELEASE_ID = $DraftRelease.id
          $DRAFT_RELEASE_TAG = $DraftRelease.tag_name

          Add-Content -Path ($env:GITHUB_ENV, $env:GITHUB_OUTPUT) -Value "DRAFT_RELEASE_ID=$DRAFT_RELEASE_ID"
          Add-Content -Path ($env:GITHUB_ENV, $env:GITHUB_OUTPUT) -Value "DRAFT_RELEASE_TAG=$DRAFT_RELEASE_TAG"

          Write-Host "GitHub Draft ID : $DRAFT_RELEASE_ID"
          Write-Host "GitHub Draft Tag: $DRAFT_RELEASE_TAG"

      - name: Uploading Assets to the Draft Release
        shell: pwsh
        run: |
          # Create Release Zip
          $InstallKitDir = Join-Path $env:RUNNER_TEMP "App_Control_Studio_Install_Kit"
          New-Item -Path $InstallKitDir -ItemType Directory -Force | Out-Null

          Copy-Item -Path "${{ env.MSIXBundle_PATH }}" -Destination $InstallKitDir -Force
          Copy-Item -Path "${{ env.CERT_PATH }}" -Destination $InstallKitDir -Force
          Copy-Item -Path "Install.ps1" -Destination $InstallKitDir -Force
          Copy-Item -Path "Install.cmd" -Destination $InstallKitDir -Force

          $ZipName = "App.Control.Studio_Install_Kit_v${{ env.PACKAGE_VERSION }}.zip"
          $ZipPath = Join-Path $env:RUNNER_TEMP $ZipName
          Compress-Archive -Path "$InstallKitDir\*" -DestinationPath $ZipPath -Force

          # Standalone MSIXBundle for in-app updates
          $StandaloneBundleName = "App.Control.Studio_${{ env.PACKAGE_VERSION }}.msixbundle"

          $Assets = @(
              @{ Path = $ZipPath; Name = $ZipName }
              @{ Path = "${{ env.MSIXBundle_PATH }}"; Name = $StandaloneBundleName }
              @{ Path = "${{ env.X64MSBuildLog_PATH }}"; Name = 'X64MSBuildLog.binlog' }
              @{ Path = "${{ env.ARM64MSBuildLog_PATH }}"; Name = 'ARM64MSBuildLog.binlog' }
              @{ Path = "${{ env.X64Symbol_PATH }}"; Name = "${{ env.X64Symbol_NAME }}" }
              @{ Path = "${{ env.ARM64Symbol_PATH }}"; Name = "${{ env.ARM64Symbol_NAME }}" }
              @{ Path = "${{ env.SBOM_PATH }}"; Name = "${{ env.SBOM_NAME }}" }
              @{ Path = "${{ env.CERT_PATH }}"; Name = "${{ env.CERT_NAME }}" }
          )

          [string]$DraftReleaseId = $env:DRAFT_RELEASE_ID
          [string]$Repo = "${{ github.repository }}"
          [string]$AuthHeader = "token ${{ secrets.GITHUB_TOKEN }}"

          foreach ($Asset in $Assets) {
              if (Test-Path -LiteralPath $Asset.Path) {
                  [string]$UploadUrl = "https://uploads.github.com/repos/$Repo/releases/$DraftReleaseId/assets?name=$($Asset.Name)"
                  Write-Host "Uploading $($Asset.Name) ..."
                  Invoke-RestMethod -Uri $UploadUrl -Method Put -InFile $Asset.Path -Headers @{
                      'Authorization' = $AuthHeader
                      'Content-Type'  = 'application/octet-stream'
                  } | Out-Null
              }
          }

      # ---------------------------
      # SINGLE ARTIFACT UPLOAD (faster)
      # ---------------------------

      - name: Upload build artifacts (single artifact)
        uses: actions/upload-artifact@v6
        with:
          retention-days: 1
          compression-level: 0
          name: acs-build-output
          path: |
            ${{ env.MSIXBundle_PATH }}
            ${{ env.X64MSBuildLog_PATH }}
            ${{ env.ARM64MSBuildLog_PATH }}
            ${{ env.X64Symbol_PATH }}
            ${{ env.ARM64Symbol_PATH }}
            ${{ env.SBOM_PATH }}
            ${{ env.CERT_PATH }}

  # Attestation should run right after build and no other third-party steps in between.
  attest:
    needs: [build]
    runs-on: windows-2025
    permissions:
      contents: read
      attestations: write
      id-token: write

    steps:
      - name: Downloading all artifacts
        uses: actions/download-artifact@v4
        with:
          name: acs-build-output
          path: Downloaded-Artifacts

      - name: Display structure of downloaded files
        shell: pwsh
        run: |
          ls -R Downloaded-Artifacts

      - name: Generating Artifact Provenance Attestation
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: "Downloaded-Artifacts/*"

      - name: Generating SBOM attestation
        uses: actions/attest-sbom@v3
        with:
          subject-path: "Downloaded-Artifacts/*"
          sbom-path: "Downloaded-Artifacts/manifest.spdx.json"
          show-summary: true

  final:
    needs: [build, attest]
    runs-on: windows-2025
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Check out the repository code
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Updating The MSIXBundle Download Links and Version via Pull Request
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          [string]$MSIXBundleName = "${{ needs.build.outputs.MSIXBundle_NAME }}"

          # Spaces in files added to the GitHub assets will be replaced with dots
          [string]$AdjustedMSIXBundleName = $MSIXBundleName.Replace('App Control Studio', 'App.Control.Studio')

          [string]$DRAFT_RELEASE_TAG = "${{ needs.build.outputs.DRAFT_RELEASE_TAG }}"
          [string]$GitHubRepository = "${{ github.repository }}"
          [string]$PACKAGE_VERSION = "${{ needs.build.outputs.PACKAGE_VERSION }}"

          [string]$DownloadURLForMSIXBundle = "https://github.com/$GitHubRepository/releases/download/$DRAFT_RELEASE_TAG/$AdjustedMSIXBundleName"

          [string]$DownloadURLFilePathForMSIXBundle = '.\App Control Studio\MSIXBundleDownloadURL.txt'
          [string]$VersionFilePath = '.\App Control Studio\version.txt'

          Set-Content -Path $DownloadURLFilePathForMSIXBundle -Value $DownloadURLForMSIXBundle -Force
          Set-Content -Path $VersionFilePath -Value $PACKAGE_VERSION -Force

          git config --global user.email '101721830+OFFSECHQ@users.noreply.github.com'
          git config --global user.name 'offsechq'

          if (git status --porcelain) {

              [string]$NewBranchName = 'App-Control-Studio-DownloadLink-Version-Update'
              git checkout -b $NewBranchName

              [string]$CommitMessageAndPRTitle = "App-Control-Studio-DownloadLink-Version-Update-Version-$PACKAGE_VERSION"

              git add $DownloadURLFilePathForMSIXBundle
              git add $VersionFilePath
              git commit -m $CommitMessageAndPRTitle

              git push -u origin $NewBranchName

              $PRBody = @"
          This PR updates MSIXBundleDownloadURL.txt to:

          $DownloadURLForMSIXBundle

          And version.txt to:

          $PACKAGE_VERSION
          "@

              gh pr create --title $CommitMessageAndPRTitle --body $PRBody --base main --label 'Automated 🤖' --assignee OFFSECHQ
          }
          else {
              Write-Host "No changes to commit. Version and Download URL are already up to date."
          }

      - name: Add Body Text to the Draft Release
        shell: pwsh
        run: |
          $ReleaseId = "${{ needs.build.outputs.DRAFT_RELEASE_ID }}"
          $DraftTag  = "${{ needs.build.outputs.DRAFT_RELEASE_TAG }}"
          $Repo      = "${{ github.repository }}"

          $Note = @(
              ""
              "# Installation"
              ""
              "<a href=`"https://apps.microsoft.com/detail/9png1jddtgp8?mode=direct`">"
              "  <img src=`"https://get.microsoft.com/images/en-us%20dark.svg`" width=`"300`" alt=`"install App Control Studio from Microsoft Store`"/>"
              "</a>"
              ""
              "**Install it from the Microsoft Store: https://apps.microsoft.com/detail/9png1jddtgp8**"
              ""
              "[**Documentation**](https://github.com/OFFSECHQ/windows-security-studio/wiki/App-Control-Studio)"
              ""
              "## What's New"
              ""
              "<!-- Main Content -->"
              ""
              "<br>"
              ""
              "How to verify the MSIXBundle's authenticity:"
              ""
              "```"
              "gh attestation verify `"Path To MSIXBundle`" --repo OFFSECHQ/windows-security-studio --format json"
              "```"
              ""
              "You can install the GitHub CLI from Winget:"
              ""
              "```"
              "winget install --id GitHub.cli"
              "```"
              ""
              "<br>"
              ""
          ) -join "`n"

          $Payload = @{
            body = $Note
            tag_name = $DraftTag
          } | ConvertTo-Json

          $Url = "https://api.github.com/repos/$Repo/releases/$ReleaseId"

          Invoke-RestMethod -Uri $Url -Method Patch -Headers @{
            "Authorization" = "token ${{ secrets.GITHUB_TOKEN }}"
            "Content-Type"  = "application/json"
          } -Body $Payload
