name: Build System Security Studio MSIX Package

on:
  workflow_dispatch:
    inputs:
      install_deps:
        description: "Install dependencies via Winget / VS BuildTools EXE (SLOW). Keep false on GitHub-hosted runners."
        required: false
        default: "false"

# Prevent the workflow from running more than once per change
concurrency:
  group: HSSBuildWorkFlowGitHubSource
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-2025

    # Create outputs for this job where only other job that use "needs" keyword can use them.
    outputs:
      DRAFT_RELEASE_ID: ${{ steps.find_draft_release.outputs.DRAFT_RELEASE_ID }}
      DRAFT_RELEASE_TAG: ${{ steps.find_draft_release.outputs.DRAFT_RELEASE_TAG }}
      PACKAGE_VERSION: ${{ steps.main_buildOp.outputs.PACKAGE_VERSION }}
      MSIXBundle_PATH: ${{ steps.main_buildOp.outputs.MSIXBundle_PATH }}
      MSIXBundle_NAME: ${{ steps.main_buildOp.outputs.MSIXBundle_NAME }}
      X64MSBuildLog_PATH: ${{ steps.main_buildOp.outputs.X64MSBuildLog_PATH }}
      ARM64MSBuildLog_PATH: ${{ steps.main_buildOp.outputs.ARM64MSBuildLog_PATH }}
      X64Symbol_PATH: ${{ steps.main_buildOp.outputs.X64Symbol_PATH }}
      X64Symbol_NAME: ${{ steps.main_buildOp.outputs.X64Symbol_NAME }}
      ARM64Symbol_PATH: ${{ steps.main_buildOp.outputs.ARM64Symbol_PATH }}
      ARM64Symbol_NAME: ${{ steps.main_buildOp.outputs.ARM64Symbol_NAME }}
      SBOM_PATH: ${{ steps.main_buildOp.outputs.SBOM_PATH }}
      SBOM_NAME: ${{ steps.main_buildOp.outputs.SBOM_NAME }}
      CERT_PATH: ${{ steps.main_buildOp.outputs.CERT_PATH }}
      CERT_NAME: ${{ steps.main_buildOp.outputs.CERT_NAME }}

    permissions:
      contents: write # Required for adding files to the GitHub draft release

    steps:
      - name: Check out the repository code
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      # ---------------------------
      # CACHES (major speed boosts)
      # ---------------------------

      - name: Cache NuGet packages
        uses: actions/cache@v5
        with:
          path: |
            ~\.nuget\packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.sln', '**/*.csproj', '**/packages.lock.json', '**/*.props', '**/*.targets') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Cache Cargo registry/git + Rust target
        uses: actions/cache@v5
        with:
          path: |
            ~\.cargo\registry
            ~\.cargo\git
            App Control Studio\eXclude\Rust Interop Library\target
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            cargo-${{ runner.os }}-

      - name: Cache sbom-tool
        uses: actions/cache@v5
        with:
          path: ${{ runner.temp }}\sbom-tool.exe
          key: sbomtool-${{ runner.os }}-latest

      - name: Building And Packaging the System Security Studio
        id: main_buildOp
        shell: pwsh
        working-directory: "./System Security Studio"
        run: |
          # Requires -Version 7.5
          # Requires -RunAsAdministrator

          $InstallDeps = '${{ inputs.install_deps }}' -eq 'true'
          Write-Host "install_deps = $InstallDeps"

          function Build_HSS {
              param(
                  [bool]$DownloadRepo,
                  [bool]$InstallDeps,
                  [bool]$Workflow,
                  [bool]$UpdateWorkLoads
              )

              $ErrorActionPreference = 'Stop'
              $Stopwatch = [System.Diagnostics.Stopwatch]::StartNew()

              Set-ItemProperty -Path 'HKLM:\SYSTEM\CurrentControlSet\Control\FileSystem' -Name 'LongPathsEnabled' -Value 1 -Force

              [System.String]$script:HSSDirectory

              if ($DownloadRepo) {

                  [System.String]$BranchName = 'main'
                  [System.String]$RepoName = 'windows-security-studio'
                  [System.String]$RepoUrl = "https://github.com/OFFSECHQ/$RepoName/archive/refs/heads/$BranchName.zip"
                  [System.String]$ZipPath = [System.IO.Path]::Combine($env:TEMP, "$RepoName.zip")
                  [System.String]$InitialWorkingDirectory = $PWD.Path
                  $script:HSSDirectory = [System.IO.Path]::Combine($InitialWorkingDirectory, "$RepoName-$BranchName", 'System Security Studio')

                  if (Test-Path -Path $script:HSSDirectory -PathType Container) {
                      Remove-Item -Path $script:HSSDirectory -Recurse -Force
                  }

                  Invoke-WebRequest -Uri $RepoUrl -OutFile $ZipPath
                  Expand-Archive -Path $ZipPath -DestinationPath $InitialWorkingDirectory -Force
                  Remove-Item -Path $ZipPath -Force
                  Set-Location -Path $script:HSSDirectory
              }
              else {
                  $script:HSSDirectory = $PWD.Path
              }

              if ($InstallDeps) {

                  # Install Winget if it doesn't exist
                  if (!(Get-Command -Name 'winget.exe' -ErrorAction Ignore)) {

                      # Retrieve the latest Winget release information
                      $WingetReleases = Invoke-RestMethod -Uri 'https://api.github.com/repos/microsoft/winget-cli/releases'
                      $LatestRelease = $WingetReleases | Select-Object -First 1
                      [string]$WingetURL = $LatestRelease.assets.browser_download_url | Where-Object { $_.EndsWith('.msixbundle') } | Select-Object -First 1
                      [string]$WingetLicense = $LatestRelease.assets.browser_download_url | Where-Object { $_.EndsWith('License1.xml') } | Select-Object -First 1
                      [string]$DepsZipURL = $LatestRelease.assets.browser_download_url | Where-Object { $_.EndsWith('DesktopAppInstaller_Dependencies.zip') } | Select-Object -First 1

                      [hashtable]$Downloads = @{
                          'DesktopAppInstaller_Dependencies.zip' = $DepsZipURL
                          'Winget.msixbundle'                    = $WingetURL
                          'License1.xml'                         = $WingetLicense
                      }

                      $Downloads.GetEnumerator() | ForEach-Object -Parallel {
                          Invoke-RestMethod -Uri $_.Value -OutFile $_.Key
                      }

                      Expand-Archive -Path 'DesktopAppInstaller_Dependencies.zip' -DestinationPath .\ -Force

                      Stop-Process -Name 'WindowsTerminal' -Force -ErrorAction Ignore

                      [string[]]$DependencyPaths = (Get-ChildItem -Path .\x64 -Filter '*.appx' -File -Force).FullName
                      Add-AppxProvisionedPackage -Online -PackagePath 'Winget.msixbundle' -DependencyPackagePath $DependencyPaths -LicensePath 'License1.xml'

                      Add-AppPackage -Path 'Winget.msixbundle' -DependencyPath "$($DependencyPaths[0])", "$($DependencyPaths[1])" -ForceTargetApplicationShutdown -ForceUpdateFromAnyVersion
                  }

                  Write-Host 'The version of the Winget currently in use:'
                  Write-Host (winget --version)

                  winget source update

                  Write-Host "`nInstalling Rust toolchain" -ForegroundColor Magenta
                  $null = winget install --id Rustlang.Rustup --exact --accept-package-agreements --accept-source-agreements --uninstall-previous --force --source winget
                  if ($LASTEXITCODE -ne 0) { throw "Failed installing Rust: $LASTEXITCODE" }

                  Write-Host "`nInstalling .NET SDK" -ForegroundColor Magenta
                  $null = winget install --id Microsoft.DotNet.SDK.10 --exact --accept-package-agreements --accept-source-agreements --uninstall-previous --force --source winget
                  if ($LASTEXITCODE -ne 0) { throw "Failed installing .NET SDK: $LASTEXITCODE" }

                  Write-Host "`nInstalling Visual Studio Build Tools" -ForegroundColor Magenta
                  Invoke-RestMethod -Uri "https://aka.ms/vs/18/insiders/vs_BuildTools.exe" -OutFile "vs_BuildTools.exe"
                  Start-Process -Wait -FilePath .\vs_BuildTools.exe -ArgumentList '--force --wait --passive --add Microsoft.VisualStudio.Workload.VCTools --add Microsoft.VisualStudio.Workload.MSBuildTools --add Microsoft.VisualStudio.Workload.UniversalBuildTools --add Microsoft.VisualStudio.Component.VC.Tools.x86.x64 --add Microsoft.VisualStudio.Component.Windows11SDK.26100 --includeRecommended --add Microsoft.VisualStudio.Component.VC.Tools.ARM64'
                  if ($LASTEXITCODE -ne 0) { throw 'Failed to install Visual Studio Build Tools' }
              }

              # Refresh the environment variables so the current session detects dotnet/rust installs
              $Env:Path = [System.Environment]::GetEnvironmentVariable('Path', 'Machine') + ';' +
                          [System.Environment]::GetEnvironmentVariable('Path', 'User')

              # Start VS developer environment
              $installationPath = & 'C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe' -prerelease -latest -property installationPath
              if ($installationPath -and (Test-Path -Path "$installationPath\Common7\Tools\vsdevcmd.bat" -PathType Leaf)) {
                  & "${env:COMSPEC}" /s /c "`"$installationPath\Common7\Tools\vsdevcmd.bat`" -no_logo && set" | ForEach-Object {
                      $name, $value = $_ -split '=', 2
                      Set-Content -Path env:\"$name" -Value $value -Force
                  }
              }

              # Remove any possible existing directories (kept as-is to preserve deterministic outputs)
              Remove-Item -Path .\MSIXOutputX64 -Recurse -Force -ErrorAction Ignore
              Remove-Item -Path .\MSIXOutputARM64 -Recurse -Force -ErrorAction Ignore
              Remove-Item -Path .\MSIXBundleOutput -Recurse -Force -ErrorAction Ignore
              Remove-Item -Path .\bin -Recurse -Force -ErrorAction Ignore
              Remove-Item -Path .\obj -Recurse -Force -ErrorAction Ignore

              if ($UpdateWorkLoads) {
                  dotnet workload update
                  dotnet workload config --update-mode workload-set
                  dotnet workload update
                  if ($LASTEXITCODE -ne 0) { throw "Failed updating workloads: $LASTEXITCODE" }
              }

              dotnet --info
              dotnet --list-sdks

              function Find-mspdbcmf {
                  [string]$VS = & 'C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe' -prerelease -latest -property resolvedInstallationPath -products *
                  [string]$BasePath = Join-Path $VS 'VC\Tools\MSVC'
                  [string[]]$VersionDirs = [System.IO.Directory]::GetDirectories($BasePath)

                  [Version]$Highest = [Version]'0.0.0.0'
                  [string]$Folder = $null
                  foreach ($Dir in $VersionDirs) {
                      $Name = [System.IO.Path]::GetFileName($Dir)
                      [Version]$Cur = $null
                      if ([Version]::TryParse($Name, [ref]$Cur)) {
                          if ($Cur -gt $Highest) { $Highest = $Cur; $Folder = $Name }
                      }
                  }
                  if (!$Folder) { throw "No MSVC dirs found in $BasePath" }

                  $Path = Join-Path $BasePath "$Folder\bin\Hostx64\x64\mspdbcmf.exe"
                  if (!(Test-Path $Path)) { throw "mspdbcmf.exe not found: $Path" }
                  return $Path
              }

              [string]$mspdbcmfPath = Find-mspdbcmf

              function Find-MSBuild {
                  [string]$VS = & 'C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe' -prerelease -latest -property resolvedInstallationPath -products *
                  [string]$MSBuild = Join-Path $VS 'MSBuild\Current\Bin\MSBuild.exe'
                  if (!(Test-Path $MSBuild)) { throw "MSBuild.exe not found: $MSBuild" }
                  return $MSBuild
              }

              [string]$MSBuildPath = Find-MSBuild

              #region --- Compile C++ projects ---
              . $MSBuildPath '..\App Control Studio\eXclude\ComManager\ComManager.slnx' /p:Configuration=Release /p:Platform=x64   /target:"clean;Rebuild"
              if ($LASTEXITCODE -ne 0) { throw "Failed ComManager x64 build: $LASTEXITCODE" }

              . $MSBuildPath '..\App Control Studio\eXclude\ComManager\ComManager.slnx' /p:Configuration=Release /p:Platform=arm64 /target:"clean;Rebuild"
              if ($LASTEXITCODE -ne 0) { throw "Failed ComManager arm64 build: $LASTEXITCODE" }
              #endregion

              #region --- RUST projects ---
              rustup default nightly
              if ($LASTEXITCODE -ne 0) { throw "Failed setting Rust nightly: $LASTEXITCODE" }

              rustup target add aarch64-pc-windows-msvc
              if ($LASTEXITCODE -ne 0) { throw "Failed adding ARM64 target: $LASTEXITCODE" }

              rustup target add x86_64-pc-windows-msvc
              if ($LASTEXITCODE -ne 0) { throw "Failed adding X64 target: $LASTEXITCODE" }

              rustup update
              if ($LASTEXITCODE -ne 0) { throw "Failed rustup update: $LASTEXITCODE" }

              [string]$Current_Location = (Get-Location).Path
              Set-Location -Path '..\App Control Studio\eXclude\Rust Interop Library'

              # NOTE: kept as-is to preserve your current behavior
              if (Test-Path -LiteralPath 'Cargo.lock' -PathType Leaf) {
                  Remove-Item -Force -LiteralPath 'Cargo.lock'
              }

              rustup toolchain install nightly
              rustup default nightly
              rustup component add rust-src --toolchain nightly-x86_64-pc-windows-msvc
              rustup update

              cargo clean
              cargo update --verbose
              cargo tree

              rustup show active-toolchain

              cargo build_x64
              if ($LASTEXITCODE -ne 0) { throw "Failed Rust x64 build: $LASTEXITCODE" }

              cargo build_arm64
              if ($LASTEXITCODE -ne 0) { throw "Failed Rust arm64 build: $LASTEXITCODE" }

              Set-Location -Path $Current_Location
              #endregion

              #region --- C# projects ---
              dotnet restore '..\App Control Studio\eXclude\DISMService\DISMService.csproj' -r win-x64
              dotnet restore '..\App Control Studio\eXclude\DISMService\DISMService.csproj' -r win-arm64

              dotnet clean  '..\App Control Studio\eXclude\DISMService\DISMService.csproj' --configuration Release
              dotnet build  '..\App Control Studio\eXclude\DISMService\DISMService.csproj' --configuration Release --verbosity minimal /p:Platform=x64 /p:RuntimeIdentifier=win-x64
              dotnet msbuild '..\App Control Studio\eXclude\DISMService\DISMService.csproj' /p:Configuration=Release /restore /p:Platform=x64 /p:RuntimeIdentifier=win-x64 /p:PublishProfile="..\App Control Studio\eXclude\DISMService\Properties\PublishProfiles\win-x64.pubxml" /t:Publish -v:minimal

              dotnet clean  '..\App Control Studio\eXclude\DISMService\DISMService.csproj' --configuration Release
              dotnet build  '..\App Control Studio\eXclude\DISMService\DISMService.csproj' --configuration Release --verbosity minimal /p:Platform=ARM64 /p:RuntimeIdentifier=win-arm64
              dotnet msbuild '..\App Control Studio\eXclude\DISMService\DISMService.csproj' /p:Configuration=Release /restore /p:Platform=arm64 /p:RuntimeIdentifier=win-arm64 /p:PublishProfile="..\App Control Studio\eXclude\DISMService\Properties\PublishProfiles\win-arm64.pubxml" /t:Publish -v:minimal

              dotnet restore '..\App Control Studio\eXclude\QuantumRelayHSS\QuantumRelayHSS.csproj' -r win-x64
              dotnet restore '..\App Control Studio\eXclude\QuantumRelayHSS\QuantumRelayHSS.csproj' -r win-arm64

              dotnet clean  '..\App Control Studio\eXclude\QuantumRelayHSS\QuantumRelayHSS.csproj' --configuration Release
              dotnet build  '..\App Control Studio\eXclude\QuantumRelayHSS\QuantumRelayHSS.csproj' --configuration Release --verbosity minimal /p:Platform=x64 /p:RuntimeIdentifier=win-x64
              dotnet msbuild '..\App Control Studio\eXclude\QuantumRelayHSS\QuantumRelayHSS.csproj' /p:Configuration=Release /restore /p:Platform=x64 /p:RuntimeIdentifier=win-x64 /p:PublishProfile="..\App Control Studio\eXclude\QuantumRelayHSS\Properties\PublishProfiles\win-x64.pubxml" /t:Publish -v:minimal

              dotnet clean  '..\App Control Studio\eXclude\QuantumRelayHSS\QuantumRelayHSS.csproj' --configuration Release
              dotnet build  '..\App Control Studio\eXclude\QuantumRelayHSS\QuantumRelayHSS.csproj' --configuration Release --verbosity minimal /p:Platform=ARM64 /p:RuntimeIdentifier=win-arm64
              dotnet msbuild '..\App Control Studio\eXclude\QuantumRelayHSS\QuantumRelayHSS.csproj' /p:Configuration=Release /restore /p:Platform=arm64 /p:RuntimeIdentifier=win-arm64 /p:PublishProfile="..\App Control Studio\eXclude\QuantumRelayHSS\Properties\PublishProfiles\win-arm64.pubxml" /t:Publish -v:minimal
              #endregion

              [string]$CsProjFilePath = (Resolve-Path -Path '.\System Security Studio.csproj').Path

              # Copy X64 components
              Copy-Item -Path '..\App Control Studio\eXclude\ComManager\x64\Release\ComManager.exe' -Destination '.\CppInterop\ComManager.exe' -Force
              Copy-Item -Path '..\App Control Studio\eXclude\DISMService\OutputX64\DISMService.exe' -Destination '.\DISMService.exe' -Force
              Copy-Item -Path '..\App Control Studio\eXclude\QuantumRelayHSS\OutputX64\QuantumRelayHSS.exe' -Destination '.\QuantumRelayHSS.exe' -Force

              dotnet clean 'System Security Studio.csproj' --configuration Release
              dotnet build 'System Security Studio.csproj' --configuration Release --verbosity minimal /p:Platform=x64 /p:RuntimeIdentifier=win-x64
              if ($LASTEXITCODE -ne 0) { throw "Failed building x64 HSS: $LASTEXITCODE" }

              dotnet msbuild 'System Security Studio.csproj' /t:Publish /p:Configuration=Release /p:RuntimeIdentifier=win-x64 /p:AppxPackageDir="MSIXOutputX64\" /p:GenerateAppxPackageOnBuild=true /p:Platform=x64 -v:minimal /p:MsPdbCmfExeFullpath=$mspdbcmfPath -bl:X64MSBuildLog.binlog
              if ($LASTEXITCODE -ne 0) { throw "Failed packaging x64 HSS: $LASTEXITCODE" }

              # Copy ARM64 components
              Copy-Item -Path '..\App Control Studio\eXclude\ComManager\ARM64\Release\ComManager.exe' -Destination '.\CppInterop\ComManager.exe' -Force
              Copy-Item -Path '..\App Control Studio\eXclude\DISMService\OutputARM64\DISMService.exe' -Destination '.\DISMService.exe' -Force
              Copy-Item -Path '..\App Control Studio\eXclude\QuantumRelayHSS\OutputARM64\QuantumRelayHSS.exe' -Destination '.\QuantumRelayHSS.exe' -Force

              dotnet clean 'System Security Studio.csproj' --configuration Release
              dotnet build 'System Security Studio.csproj' --configuration Release --verbosity minimal /p:Platform=ARM64 /p:RuntimeIdentifier=win-arm64
              if ($LASTEXITCODE -ne 0) { throw "Failed building ARM64 HSS: $LASTEXITCODE" }

              dotnet msbuild 'System Security Studio.csproj' /t:Publish /p:Configuration=Release /p:RuntimeIdentifier=win-arm64 /p:AppxPackageDir="MSIXOutputARM64\" /p:GenerateAppxPackageOnBuild=true /p:Platform=ARM64 -v:minimal /p:MsPdbCmfExeFullpath=$mspdbcmfPath -bl:ARM64MSBuildLog.binlog
              if ($LASTEXITCODE -ne 0) { throw "Failed packaging ARM64 HSS: $LASTEXITCODE" }

              function Get-MSIXFile {
                  param(
                      [string]$BasePath,
                      [string]$FolderPattern,
                      [string]$FileNamePattern,
                      [string]$ErrorMessageFolder,
                      [string]$ErrorMessageFile
                  )
                  [string[]]$Folders = [System.IO.Directory]::GetDirectories($BasePath)
                  [string]$DetectedFolder = $null
                  foreach ($Folder in $Folders) {
                      if ([regex]::IsMatch($Folder, $FolderPattern)) { $DetectedFolder = $Folder; break }
                  }
                  if (!$DetectedFolder) { throw $ErrorMessageFolder }

                  [string[]]$Files = [System.IO.Directory]::GetFiles($DetectedFolder)
                  [string]$DetectedFile = $null
                  foreach ($File in $Files) {
                      if ([regex]::IsMatch($File, $FileNamePattern)) { $DetectedFile = $File; break }
                  }
                  if (!$DetectedFile) { throw $ErrorMessageFile }
                  return $DetectedFile
              }

              # Certificate
              $CertSubject = 'CN=C62E63B6-6EF1-4F86-B80F-41A725BD0189'
              $Cert = New-SelfSignedCertificate -Type Custom -Subject $CertSubject `
                  -KeyUsage DigitalSignature `
                  -FriendlyName 'OFFSECHQ Code Signing' `
                  -CertStoreLocation 'Cert:\CurrentUser\My' `
                  -TextExtension @('2.5.29.37={text}1.3.6.1.5.5.7.3.3', '2.5.29.19={text}')

              function Get-SignToolPath {
                  [string]$BasePath = 'C:\Program Files (x86)\Windows Kits\10\bin'
                  [string[]]$VersionDirs = [System.IO.Directory]::GetDirectories($BasePath)
                  [Version]$Highest = [Version]'0.0.0.0'
                  [string]$Folder = $null
                  foreach ($Dir in $VersionDirs) {
                      $Name = [System.IO.Path]::GetFileName($Dir)
                      [Version]$Cur = $null
                      if ([Version]::TryParse($Name, [ref]$Cur)) {
                          if ($Cur -gt $Highest) { $Highest = $Cur; $Folder = $Name }
                      }
                  }
                  if (!$Folder) { throw "No Windows SDK dirs in $BasePath" }
                  $CPUArch = @{ AMD64 = 'x64'; ARM64 = 'arm64' }[$Env:PROCESSOR_ARCHITECTURE]
                  return (Join-Path $BasePath "$Folder\$CPUArch\signtool.exe")
              }

              $SignToolPath = Get-SignToolPath
              if (!(Test-Path $SignToolPath)) { throw "signtool.exe not found: $SignToolPath" }

              # Find outputs
              $FinalMSIXX64Path = Get-MSIXFile -BasePath (Join-Path $script:HSSDirectory 'MSIXOutputX64') `
                -FolderPattern 'System Security Studio_\d+\.\d+\.\d+\.\d+_x64_Test' `
                -FileNamePattern 'System Security Studio_\d+\.\d+\.\d+\.\d+_x64\.msix' `
                -ErrorMessageFolder 'Could not find X64 MSIX dir' `
                -ErrorMessageFile 'Could not find X64 MSIX file'

              $FinalMSIXX64Name = [System.IO.Path]::GetFileName($FinalMSIXX64Path)

              $FinalMSIXX64SymbolPath = Get-MSIXFile -BasePath (Join-Path $script:HSSDirectory 'MSIXOutputX64') `
                -FolderPattern 'System Security Studio_\d+\.\d+\.\d+\.\d+_x64_Test' `
                -FileNamePattern 'System Security Studio_\d+\.\d+\.\d+\.\d+_x64\.appxsym' `
                -ErrorMessageFolder 'Could not find X64 symbol dir' `
                -ErrorMessageFile 'Could not find X64 symbol file'

              $FinalMSIXX64SymbolName = [System.IO.Path]::GetFileName($FinalMSIXX64SymbolPath)

              & $SignToolPath sign /fd SHA256 /sha1 $Cert.Thumbprint /td SHA256 /tr "http://timestamp.digicert.com" $FinalMSIXX64Path
              if ($LASTEXITCODE -ne 0) { throw "SignTool failed x64: $LASTEXITCODE" }

              $FinalMSIXARM64Path = Get-MSIXFile -BasePath (Join-Path $script:HSSDirectory 'MSIXOutputARM64') `
                -FolderPattern 'System Security Studio_\d+\.\d+\.\d+\.\d+_arm64_Test' `
                -FileNamePattern 'System Security Studio_\d+\.\d+\.\d+\.\d+_arm64\.msix' `
                -ErrorMessageFolder 'Could not find ARM64 MSIX dir' `
                -ErrorMessageFile 'Could not find ARM64 MSIX file'

              $FinalMSIXARM64Name = [System.IO.Path]::GetFileName($FinalMSIXARM64Path)

              $FinalMSIXARM64SymbolPath = Get-MSIXFile -BasePath (Join-Path $script:HSSDirectory 'MSIXOutputARM64') `
                -FolderPattern 'System Security Studio_\d+\.\d+\.\d+\.\d+_arm64_Test' `
                -FileNamePattern 'System Security Studio_\d+\.\d+\.\d+\.\d+_arm64\.appxsym' `
                -ErrorMessageFolder 'Could not find ARM64 symbol dir' `
                -ErrorMessageFile 'Could not find ARM64 symbol file'

              $FinalMSIXARM64SymbolName = [System.IO.Path]::GetFileName($FinalMSIXARM64SymbolPath)

              & $SignToolPath sign /fd SHA256 /sha1 $Cert.Thumbprint /td SHA256 /tr "http://timestamp.digicert.com" $FinalMSIXARM64Path
              if ($LASTEXITCODE -ne 0) { throw "SignTool failed arm64: $LASTEXITCODE" }

              # Version detect
              $versionRegexX64 = [regex]'System Security Studio_(\d+\.\d+\.\d+\.\d+)_x64\.msix'
              $versionRegexARM64 = [regex]'System Security Studio_(\d+\.\d+\.\d+\.\d+)_arm64\.msix'
              $MatchX64 = $versionRegexX64.Match($FinalMSIXX64Name)
              $MatchARM64 = $versionRegexARM64.Match($FinalMSIXARM64Name)
              if (!$MatchX64.Success -or !$MatchARM64.Success) { throw 'Could not detect version' }
              $versionX64 = $MatchX64.Groups[1].Value
              $versionARM64 = $MatchARM64.Groups[1].Value
              if ($versionX64 -ne $versionARM64) { throw 'X64 and ARM64 versions mismatch' }

              $FinalBundleFileName = "System Security Studio_$versionX64.msixbundle"

              # Bundle output
              $MSIXBundleOutput = [System.IO.Directory]::CreateDirectory((Join-Path $script:HSSDirectory 'MSIXBundleOutput')).FullName
              [System.IO.File]::Copy($FinalMSIXX64Path, (Join-Path $MSIXBundleOutput $FinalMSIXX64Name), $true)
              [System.IO.File]::Copy($FinalMSIXARM64Path, (Join-Path $MSIXBundleOutput $FinalMSIXARM64Name), $true)

              $MSIXBundle = Join-Path $MSIXBundleOutput $FinalBundleFileName

              function Get-MakeAppxPath {
                  [string]$BasePath = 'C:\Program Files (x86)\Windows Kits\10\bin'
                  [string[]]$VersionDirs = [System.IO.Directory]::GetDirectories($BasePath)
                  [Version]$Highest = [Version]'0.0.0.0'
                  [string]$Folder = $null
                  foreach ($Dir in $VersionDirs) {
                      $Name = [System.IO.Path]::GetFileName($Dir)
                      [Version]$Cur = $null
                      if ([Version]::TryParse($Name, [ref]$Cur)) {
                          if ($Cur -gt $Highest) { $Highest = $Cur; $Folder = $Name }
                      }
                  }
                  if (!$Folder) { throw "No SDK dirs in $BasePath" }
                  $CPUArch = @{ AMD64 = 'x64'; ARM64 = 'arm64' }[$Env:PROCESSOR_ARCHITECTURE]
                  return (Join-Path $BasePath "$Folder\$CPUArch\makeappx.exe")
              }

              $MakeAppxPath = Get-MakeAppxPath
              if (!(Test-Path $MakeAppxPath)) { throw "makeappx.exe not found: $MakeAppxPath" }

              & $MakeAppxPath bundle /d $MSIXBundleOutput /p $MSIXBundle /o /v
              if ($LASTEXITCODE -ne 0) { throw "MakeAppx failed: $LASTEXITCODE" }

              # Export certificate
              $CertExportPath = Join-Path $MSIXBundleOutput 'OFFSECHQ_CodeSigning.cer'
              Export-Certificate -Cert $Cert -FilePath $CertExportPath -Type CERT

              # Sign Bundle
              & $SignToolPath sign /fd SHA256 /sha1 $Cert.Thumbprint /td SHA256 /tr "http://timestamp.digicert.com" $MSIXBundle
              if ($LASTEXITCODE -ne 0) { throw "SignTool failed bundle: $LASTEXITCODE" }

              if ($Workflow) {
                  [XML]$CSProjXMLContent = Get-Content -Path $CsProjFilePath -Force
                  [string]$MSIXVersion = $CSProjXMLContent.Project.PropertyGroup.FileVersion.Trim()

                  Add-Content -Path ($env:GITHUB_ENV, $env:GITHUB_OUTPUT) -Value "PACKAGE_VERSION=$MSIXVersion"
                  Add-Content -Path ($env:GITHUB_ENV, $env:GITHUB_OUTPUT) -Value "MSIXBundle_PATH=$MSIXBundle"
                  Add-Content -Path ($env:GITHUB_ENV, $env:GITHUB_OUTPUT) -Value "MSIXBundle_NAME=$FinalBundleFileName"
                  Add-Content -Path ($env:GITHUB_ENV, $env:GITHUB_OUTPUT) -Value "X64MSBuildLog_PATH=$((Resolve-Path -Path .\X64MSBuildLog.binlog).Path)"
                  Add-Content -Path ($env:GITHUB_ENV, $env:GITHUB_OUTPUT) -Value "ARM64MSBuildLog_PATH=$((Resolve-Path -Path .\ARM64MSBuildLog.binlog).Path)"
                  Add-Content -Path ($env:GITHUB_ENV, $env:GITHUB_OUTPUT) -Value "X64Symbol_PATH=$FinalMSIXX64SymbolPath"
                  Add-Content -Path ($env:GITHUB_ENV, $env:GITHUB_OUTPUT) -Value "X64Symbol_NAME=$FinalMSIXX64SymbolName"
                  Add-Content -Path ($env:GITHUB_ENV, $env:GITHUB_OUTPUT) -Value "ARM64Symbol_PATH=$FinalMSIXARM64SymbolPath"
                  Add-Content -Path ($env:GITHUB_ENV, $env:GITHUB_OUTPUT) -Value "ARM64Symbol_NAME=$FinalMSIXARM64SymbolName"
                  Add-Content -Path ($env:GITHUB_ENV, $env:GITHUB_OUTPUT) -Value "CERT_PATH=$CertExportPath"
                  Add-Content -Path ($env:GITHUB_ENV, $env:GITHUB_OUTPUT) -Value "CERT_NAME=OFFSECHQ_CodeSigning.cer"

                  # SBOM tool cached
                  if (!(Test-Path -LiteralPath "${Env:RUNNER_TEMP}\sbom-tool.exe")) {
                      Invoke-WebRequest -Uri 'https://github.com/microsoft/sbom-tool/releases/latest/download/sbom-tool-win-x64.exe' -OutFile "${Env:RUNNER_TEMP}\sbom-tool.exe"
                  }

                  & "${Env:RUNNER_TEMP}\sbom-tool.exe" generate -b $MSIXBundleOutput -bc .\ -pn 'System Security Studio' -ps 'OFFSECHQ' -pv $MSIXVersion -nsb 'https://github.com/OFFSECHQ/windows-security-studio' -V Verbose -gt true -li true -pm true -D true -lto 80

                  Add-Content -Path ($env:GITHUB_ENV, $env:GITHUB_OUTPUT) -Value "SBOM_PATH=$MSIXBundleOutput/_manifest/spdx_2.2/manifest.spdx.json"
                  Add-Content -Path ($env:GITHUB_ENV, $env:GITHUB_OUTPUT) -Value "SBOM_NAME=manifest.spdx.json"
              }

              if ($Stopwatch) {
                  $Stopwatch.Stop()
                  Write-Host "Total build time: $($Stopwatch.Elapsed.ToString('g'))"
              }
          }

          # For GitHub workflow (optimized): dependencies install is now optional
          Build_HSS -DownloadRepo $false -InstallDeps $InstallDeps -Workflow $true -UpdateWorkLoads $false

      - name: Finding or Creating Draft Release
        id: find_draft_release
        shell: pwsh
        run: |
          $Headers = @{ Authorization = "token ${{ secrets.GITHUB_TOKEN }}"; Accept = "application/vnd.github.v3+json" }
          $RepoUrl = "https://api.github.com/repos/${{ github.repository }}"

          $Response = Invoke-RestMethod -Uri "$RepoUrl/releases" -Headers $Headers
          $DraftRelease = $Response | Where-Object { $_.draft -eq $true } | Select-Object -First 1

          if (!$DraftRelease) {
              Write-Host "No draft release found. Creating a new one..."

              $TagName = "v${{ env.PACKAGE_VERSION }}"
              $ReleaseName = "System Security Studio v${{ env.PACKAGE_VERSION }}"

              $Body = @{
                  tag_name = $TagName
                  name = $ReleaseName
                  body = "Release $TagName - Auto-generated by workflow"
                  draft = $true
                  prerelease = $false
              } | ConvertTo-Json

              $DraftRelease = Invoke-RestMethod -Uri "$RepoUrl/releases" -Method Post -Headers $Headers -Body $Body -ContentType "application/json"
          }

          Add-Content -Path ($env:GITHUB_ENV, $env:GITHUB_OUTPUT) -Value "DRAFT_RELEASE_ID=$($DraftRelease.id)"
          Add-Content -Path ($env:GITHUB_ENV, $env:GITHUB_OUTPUT) -Value "DRAFT_RELEASE_TAG=$($DraftRelease.tag_name)"

      - name: Uploading Assets to the Draft Release
        shell: pwsh
        run: |
          $InstallKitDir = Join-Path $env:RUNNER_TEMP "System_Security_Studio_Install_Kit"
          New-Item -Path $InstallKitDir -ItemType Directory -Force | Out-Null

          Copy-Item -Path "${{ env.MSIXBundle_PATH }}" -Destination $InstallKitDir -Force
          Copy-Item -Path "${{ env.CERT_PATH }}" -Destination $InstallKitDir -Force
          Copy-Item -Path "Install.ps1" -Destination $InstallKitDir -Force
          Copy-Item -Path "Install.cmd" -Destination $InstallKitDir -Force

          $ZipName = "System.Security.Studio_Install_Kit_v${{ env.PACKAGE_VERSION }}.zip"
          $ZipPath = Join-Path $env:RUNNER_TEMP $ZipName
          Compress-Archive -Path "$InstallKitDir\*" -DestinationPath $ZipPath -Force

          $StandaloneBundleName = "System.Security.Studio_${{ env.PACKAGE_VERSION }}.msixbundle"

          $Assets = @(
              @{ Path = $ZipPath; Name = $ZipName }
              @{ Path = "${{ env.MSIXBundle_PATH }}"; Name = $StandaloneBundleName }
              @{ Path = "${{ env.X64MSBuildLog_PATH }}"; Name = 'X64MSBuildLog.binlog' }
              @{ Path = "${{ env.ARM64MSBuildLog_PATH }}"; Name = 'ARM64MSBuildLog.binlog' }
              @{ Path = "${{ env.X64Symbol_PATH }}"; Name = "${{ env.X64Symbol_NAME }}" }
              @{ Path = "${{ env.ARM64Symbol_PATH }}"; Name = "${{ env.ARM64Symbol_NAME }}" }
              @{ Path = "${{ env.SBOM_PATH }}"; Name = "${{ env.SBOM_NAME }}" }
              @{ Path = "${{ env.CERT_PATH }}"; Name = "${{ env.CERT_NAME }}" }
          )

          $DraftReleaseId = "${{ env.DRAFT_RELEASE_ID }}"
          $Repo = "${{ github.repository }}"
          $AuthHeader = "token ${{ secrets.GITHUB_TOKEN }}"

          foreach ($Asset in $Assets) {
              if (Test-Path -LiteralPath $Asset.Path) {
                  $UploadUrl = "https://uploads.github.com/repos/$Repo/releases/$DraftReleaseId/assets?name=$($Asset.Name)"
                  Write-Host "Uploading $($Asset.Name) ..."
                  Invoke-RestMethod -Uri $UploadUrl -Method Put -InFile $Asset.Path -Headers @{
                      'Authorization' = $AuthHeader
                      'Content-Type'  = 'application/octet-stream'
                  } | Out-Null
              }
          }

      # SINGLE ARTIFACT UPLOAD (faster than 7 uploads)
      - name: Upload build artifacts (single artifact)
        uses: actions/upload-artifact@v6
        with:
          retention-days: 1
          compression-level: 0
          name: hss-build-output
          path: |
            ${{ env.MSIXBundle_PATH }}
            ${{ env.X64MSBuildLog_PATH }}
            ${{ env.ARM64MSBuildLog_PATH }}
            ${{ env.X64Symbol_PATH }}
            ${{ env.ARM64Symbol_PATH }}
            ${{ env.SBOM_PATH }}
            ${{ env.CERT_PATH }}

  attest:
    needs: [build]
    runs-on: windows-2025
    permissions:
      contents: read
      attestations: write
      id-token: write

    steps:
      - name: Downloading artifacts
        uses: actions/download-artifact@v4
        with:
          name: hss-build-output
          path: Downloaded-Artifacts

      - name: Display structure
        shell: pwsh
        run: ls -R Downloaded-Artifacts

      - name: Generating Artifact Attestation
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: "Downloaded-Artifacts/*"

      - name: Generating SBOM attestation
        uses: actions/attest-sbom@v3
        with:
          subject-path: "Downloaded-Artifacts/*"
          sbom-path: "Downloaded-Artifacts/manifest.spdx.json"
          show-summary: true

  final:
    needs: [build, attest]
    runs-on: windows-2025
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Check out the repository code
        uses: actions/checkout@v5
        with:
          fetch-depth: 1

      - name: Updating The MSIXBundle Download Links and Version via Pull Request
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          [string]$MSIXBundleName = "${{ needs.build.outputs.MSIXBundle_NAME }}"

          # Spaces replaced with dots
          [string]$AdjustedMSIXBundleName = $MSIXBundleName.Replace('System Security Studio', 'System.Security.Studio')

          [string]$DRAFT_RELEASE_TAG = "${{ needs.build.outputs.DRAFT_RELEASE_TAG }}"
          [string]$GitHubRepository = "${{ github.repository }}"
          [string]$PACKAGE_VERSION = "${{ needs.build.outputs.PACKAGE_VERSION }}"

          [string]$DownloadURLForMSIXBundle = "https://github.com/$GitHubRepository/releases/download/$DRAFT_RELEASE_TAG/$AdjustedMSIXBundleName"

          [string]$DownloadURLFilePathForMSIXBundle = '.\System Security Studio\MSIXBundleDownloadURL.txt'
          [string]$VersionFilePath = '.\System Security Studio\version.txt'

          Set-Content -Path $DownloadURLFilePathForMSIXBundle -Value $DownloadURLForMSIXBundle -Force
          Set-Content -Path $VersionFilePath -Value $PACKAGE_VERSION -Force

          git config --global user.email '101721830+OFFSECHQ@users.noreply.github.com'
          git config --global user.name 'offsechq'

          if (git status --porcelain) {
              [string]$NewBranchName = 'System-Security-Studio-DownloadLink-Version-Update'
              git checkout -b $NewBranchName

              [string]$CommitMessageAndPRTitle = "System-Security-Studio-DownloadLink-Version-Update-Version-$PACKAGE_VERSION"

              git add $DownloadURLFilePathForMSIXBundle
              git add $VersionFilePath
              git commit -m $CommitMessageAndPRTitle
              git push -u origin $NewBranchName

              $PRBody = @"
          This PR updates MSIXBundleDownloadURL.txt to:
          $DownloadURLForMSIXBundle

          And version.txt to:
          $PACKAGE_VERSION
          "@

              gh pr create --title $CommitMessageAndPRTitle --body $PRBody --base main --label 'Automated 🤖' --assignee OFFSECHQ
          }
          else {
              Write-Host "No changes to commit. Version and Download URL are already up to date."
          }

      - name: Add Body Text to the Draft Release
        shell: pwsh
        run: |
          $ReleaseId = "${{ needs.build.outputs.DRAFT_RELEASE_ID }}"
          $Repo = "${{ github.repository }}"
          $DraftTag = "${{ needs.build.outputs.DRAFT_RELEASE_TAG }}"

          $Note = @(
              ""
              "# System Security Studio"
              ""
              "A Windows application for system security hardening."
              ""
              "[**Documentation**](https://github.com/OFFSECHQ/windows-security-studio/wiki)"
              ""
              "## What's New"
              ""
              "<!-- Main Content -->"
              ""
              "<br>"
              ""
              "How to verify the MSIXBundle's authenticity:"
              ""
              "```"
              "gh attestation verify `"Path To MSIXBundle`" --repo OFFSECHQ/windows-security-studio --format json"
              "```"
              ""
              "You can install the GitHub CLI from Winget:"
              ""
              "```"
              "winget install --id GitHub.cli"
              "```"
              ""
              "<br>"
              ""
          ) -join "`n"

          $Payload = @{
           body = $Note
           tag_name = $DraftTag
          } | ConvertTo-Json

          $Url = "https://api.github.com/repos/$Repo/releases/$ReleaseId"
          Invoke-RestMethod -Uri $Url -Method Patch -Headers @{
            "Authorization" = "token ${{ secrets.GITHUB_TOKEN }}"
            "Content-Type"  = "application/json"
          } -Body $Payload
