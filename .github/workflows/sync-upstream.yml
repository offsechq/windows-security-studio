name: Check for Upstream Updates

on:
  schedule:
    # Runs monthly on the 1st at midnight UTC
    - cron: "0 0 1 * *"
  workflow_dispatch: # Allows manual trigger

jobs:
  check-upstream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/HotCakeX/Harden-Windows-Security.git || true
          git fetch upstream

      - name: Check for new commits
        id: check
        run: |
          # Count commits in upstream not in our main
          COMMITS_BEHIND=$(git rev-list --count main..upstream/main)
          echo "commits_behind=$COMMITS_BEHIND" >> $GITHUB_OUTPUT

          if [ "$COMMITS_BEHIND" = "0" ]; then
            echo "✅ Already up to date with upstream!"
          else
            echo "📦 Upstream has $COMMITS_BEHIND new commit(s)"

            # Get detailed commit info for the issue body
            echo "## Generating detailed commit info..."

            # Recent commits with full details
            COMMIT_DETAILS=$(git log --pretty=format:"- [%h](https://github.com/HotCakeX/Harden-Windows-Security/commit/%H) %s (%an, %ar)" main..upstream/main -n 30)
            echo "commit_details<<EOF" >> $GITHUB_OUTPUT
            echo "$COMMIT_DETAILS" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT

            # File change summary
            FILES_CHANGED=$(git diff --stat main..upstream/main | tail -1)
            echo "files_changed=$FILES_CHANGED" >> $GITHUB_OUTPUT

            # Categorize changes by directory
            echo "## Categorizing changes..."
            APPCONTROL_CHANGES=$(git diff --name-only main..upstream/main | grep -c "AppControl Manager" || echo "0")
            HSS_CHANGES=$(git diff --name-only main..upstream/main | grep -c "Harden-Windows-Security" || echo "0")
            WIKI_CHANGES=$(git diff --name-only main..upstream/main | grep -c "Wiki" || echo "0")
            OTHER_CHANGES=$(git diff --name-only main..upstream/main | grep -v "AppControl Manager" | grep -v "Harden-Windows-Security" | grep -v "Wiki" | wc -l || echo "0")

            echo "appcontrol_changes=$APPCONTROL_CHANGES" >> $GITHUB_OUTPUT
            echo "hss_changes=$HSS_CHANGES" >> $GITHUB_OUTPUT
            echo "wiki_changes=$WIKI_CHANGES" >> $GITHUB_OUTPUT
            echo "other_changes=$OTHER_CHANGES" >> $GITHUB_OUTPUT
          fi

      - name: Create issue for review
        if: steps.check.outputs.commits_behind != '0'
        uses: actions/github-script@v8
        with:
          script: |
            const commits = ${{ steps.check.outputs.commits_behind }};
            const commitDetails = `${{ steps.check.outputs.commit_details }}`;
            const filesChanged = `${{ steps.check.outputs.files_changed }}`;
            const appcontrolChanges = `${{ steps.check.outputs.appcontrol_changes }}`;
            const hssChanges = `${{ steps.check.outputs.hss_changes }}`;
            const wikiChanges = `${{ steps.check.outputs.wiki_changes }}`;
            const otherChanges = `${{ steps.check.outputs.other_changes }}`;

            // Check if an issue already exists
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'upstream-sync'
            });

            if (issues.data.length > 0) {
              console.log('Issue already exists, skipping creation');
              return;
            }

            const body = [
              '## 📊 Summary',
              '',
              `The upstream repository has **${commits} new commit(s)** since our last sync.`,
              '',
              `**Files changed:** ${filesChanged}`,
              '',
              '### 📁 Changes by Area',
              '',
              '| Area | Files Changed | Maps To |',
              '|------|---------------|---------|',
              `| AppControl Manager | ${appcontrolChanges} | \`App Control Studio\` |`,
              `| Harden-Windows-Security | ${hssChanges} | \`System Security Studio\` |`,
              `| Wiki/Docs | ${wikiChanges} | Wiki |`,
              `| Other (root, workflows, etc.) | ${otherChanges} | Various |`,
              '',
              '---',
              '',
              '## 📝 Recent Commits (up to 30)',
              '',
              commitDetails,
              '',
              '---',
              '',
              '## 🔗 Quick Links',
              '',
              '- [Compare changes](https://github.com/HotCakeX/Harden-Windows-Security/compare/main...OFFSECHQ:windows-security-studio:main)',
              '- [Upstream commits](https://github.com/HotCakeX/Harden-Windows-Security/commits/main)',
              '- [Upstream releases](https://github.com/HotCakeX/Harden-Windows-Security/releases)',
              '',
              '---',
              '',
              '## ⚠️ Rebranding Notes',
              '',
              'This is a **rebranded fork**. Directory mappings:',
              '- `AppControl Manager` → `App Control Studio`',
              '- `Harden-Windows-Security` → `System Security Studio`',
              '',
              '## ✅ Review Checklist',
              '',
              '- [ ] Review commits for bug fixes',
              '- [ ] Review commits for new features',
              '- [ ] Review dependency updates',
              '- [ ] Apply relevant changes to rebranded directories',
              '- [ ] Close this issue when done',
              '',
              '---',
              '*This issue was automatically created by the monthly upstream check workflow.*'
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔄 Monthly Sync: Upstream has ${commits} new commit(s)`,
              body: body,
              labels: ['upstream-sync']
            });
