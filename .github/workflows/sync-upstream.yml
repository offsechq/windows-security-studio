name: Check for Upstream Updates

on:
  schedule:
    # Runs every week on Monday at midnight UTC
    - cron: "0 0 * * 1"
  workflow_dispatch: # Allows manual trigger

jobs:
  check-upstream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/HotCakeX/Harden-Windows-Security.git || true
          git fetch upstream

      - name: Check for new commits
        id: check
        run: |
          # Count commits in upstream not in our main
          COMMITS_BEHIND=$(git rev-list --count main..upstream/main)
          echo "commits_behind=$COMMITS_BEHIND" >> $GITHUB_OUTPUT

          if [ "$COMMITS_BEHIND" = "0" ]; then
            echo "✅ Already up to date with upstream!"
          else
            echo "📦 Upstream has $COMMITS_BEHIND new commit(s)"
            echo ""
            echo "## Recent upstream commits:"
            git log --oneline main..upstream/main -n 20
            echo ""
            echo "---"
            echo "⚠️ NOTE: This is a rebranded fork. Directory names have changed:"
            echo "  - 'AppControl Manager' → 'App Control Studio'"
            echo "  - 'Harden Windows Security' → 'System Security Studio'"
            echo ""
            echo "Review upstream changes and manually apply relevant updates."
            echo "Upstream repo: https://github.com/HotCakeX/Harden-Windows-Security"
          fi

      - name: Create issue for review
        if: steps.check.outputs.commits_behind != '0'
        uses: actions/github-script@v7
        with:
          script: |
            const commits = ${{ steps.check.outputs.commits_behind }};

            // Check if an issue already exists
            const issues = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'upstream-sync'
            });

            if (issues.data.length > 0) {
              console.log('Issue already exists, skipping creation');
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `🔄 Upstream has ${commits} new commit(s) to review`,
              body: `The upstream repository has new changes that may need to be manually applied.

            ## ⚠️ Important

            This is a **rebranded fork**. Automatic syncing is disabled because:
            - \`AppControl Manager\` has been renamed to \`App Control Studio\`
            - \`Harden Windows Security\` has been renamed to \`System Security Studio\`

            ## Steps to sync manually

            1. Review upstream commits: https://github.com/HotCakeX/Harden-Windows-Security/commits/main
            2. Identify relevant changes (dependency updates, bug fixes, new features)
            3. Manually apply changes to the corresponding rebranded directories
            4. Close this issue once reviewed

            ---
            *This issue was automatically created by the upstream check workflow.*`,
              labels: ['upstream-sync']
            });
